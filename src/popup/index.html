<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <script type="module" src="./index.ts"></script>
  <title>Multi-Session Manager</title>
</head>

<body>
  <!-- Loading state -->
  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <p>Loading sessions…</p>
  </div>

  <!-- Error state (no valid tab) -->
  <div id="error-screen" class="error-screen hidden">
    <div class="error-icon">⚠️</div>
    <p id="error-message">Cannot manage sessions for this page.</p>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="site-badge">
          <span class="site-icon">🌐</span>
          <span id="site-hostname" class="site-hostname"></span>
        </div>
        <button id="btn-manage-all" class="btn btn-ghost btn-sm" title="Manage all sessions across all sites">
          📂 All Sessions
        </button>
        <div class="header-right">
          <span class="session-count" id="session-count">0 sessions</span>
          <button id="btn-theme" class="btn-icon-only" title="Toggle theme">🌙</button>
        </div>
      </div>
    </header>

    <!-- Session list -->
    <main class="main">
      <div id="session-list" class="session-list">
        <!-- Sessions rendered here -->
      </div>

      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">📦</div>
        <p>No sessions saved yet</p>
        <p class="empty-hint">Capture your current session or add one manually</p>
      </div>
    </main>

    <!-- Action buttons -->
    <footer class="footer">
      <button id="btn-capture" class="btn btn-secondary" title="Save current browser cookies as a new session">
        <span class="btn-icon">📸</span> Capture
      </button>
      <button id="btn-add" class="btn btn-primary" title="Manually add a new session">
        <span class="btn-icon">➕</span> Add
      </button>
    </footer>
  </div>

  <!-- Add/Edit modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Add Session</h2>
        <button id="btn-modal-close" class="btn-icon-only" title="Close">✕</button>
      </div>
      <form id="session-form" class="session-form">
        <div class="form-group">
          <label for="input-label">Session Label</label>
          <input type="text" id="input-label" placeholder="e.g. Work Account, Personal…" required autocomplete="off" />
        </div>
        <!-- Storage Tabs -->
        <div class="storage-tabs">
          <div class="tabs-header">
            <button type="button" class="tab-btn active" data-tab="cookies">🍪 Cookies</button>
            <button type="button" class="tab-btn" data-tab="localStorage">📦 localStorage</button>
            <button type="button" class="tab-btn" data-tab="sessionStorage">💾 sessionStorage</button>
            <button type="button" class="tab-btn" data-tab="indexedDB">🗄️ IndexedDB</button>
            <button type="button" class="tab-btn" data-tab="webSQL">📊 WebSQL</button>
          </div>

          <div class="tabs-content">
            <div id="tab-cookies" class="tab-pane active">
              <div class="form-group">
                <label for="input-cookies">
                  Cookies
                  <span class="label-hint">(JSON array or name=value per line)</span>
                </label>
                <textarea id="input-cookies"
                  placeholder='[{"name":"sid","value":"abc123"}]&#10;or&#10;sid=abc123&#10;token=xyz'
                  rows="8"></textarea>
              </div>
            </div>

            <div id="tab-localStorage" class="tab-pane hidden">
              <div class="form-group">
                <label for="input-localStorage">
                  localStorage
                  <span class="label-hint">(JSON array)</span>
                </label>
                <textarea id="input-localStorage" placeholder='[{"key":"user_id","value":"123","domain":"example.com"}]'
                  rows="8"></textarea>
              </div>
            </div>

            <div id="tab-sessionStorage" class="tab-pane hidden">
              <div class="form-group">
                <label for="input-sessionStorage">
                  sessionStorage
                  <span class="label-hint">(JSON array)</span>
                </label>
                <textarea id="input-sessionStorage"
                  placeholder='[{"key":"temp_data","value":"value","domain":"example.com"}]' rows="8"></textarea>
              </div>
            </div>

            <div id="tab-indexedDB" class="tab-pane hidden">
              <div class="form-group">
                <label for="input-indexedDB">
                  IndexedDB
                  <span class="label-hint">(JSON array)</span>
                </label>
                <textarea id="input-indexedDB" placeholder='[{"database":"mydb","domain":"example.com","stores":[]}]'
                  rows="8"></textarea>
              </div>
            </div>

            <div id="tab-webSQL" class="tab-pane hidden">
              <div class="form-group">
                <label for="input-webSQL">
                  WebSQL
                  <span class="label-hint">(JSON array)</span>
                </label>
                <textarea id="input-webSQL" placeholder='[{"database":"mydb","domain":"example.com","tables":[]}]'
                  rows="8"></textarea>
              </div>
            </div>
          </div>
        </div>

        <div id="form-error" class="form-error hidden"></div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="btn-save" class="btn btn-primary">Save Session</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete confirmation -->
  <div id="delete-overlay" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Delete Session</h2>
      </div>
      <p class="confirm-text">Are you sure you want to delete "<span id="delete-label"></span>"?</p>
      <div class="form-actions">
        <button id="btn-delete-cancel" class="btn btn-ghost">Cancel</button>
        <button id="btn-delete-confirm" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden">Copied!</div>
</body>

</html>
